<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 160" width="100%" height="100%">
  <style>
    @keyframes flow-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100px); }
    }
    @keyframes flow-right {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(0); }
    }
    @keyframes scanline {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }
    @keyframes pulse-node {
      0%, 100% { opacity: 0.4; r: 3px; }
      50% { opacity: 1; r: 5px; fill: #4ade80; }
    }
    .grid { stroke: #0b132b; stroke-width: 1; stroke-dasharray: 4 4; }
    .sig-cyan { fill: none; stroke: #00b4d8; stroke-width: 2.5; animation: flow-left 1.5s linear infinite; }
    .sig-purple { fill: none; stroke: #9d4edd; stroke-width: 1.5; opacity: 0.7; animation: flow-right 2s linear infinite; }
    .frame-border { stroke: #00b4d8; stroke-width: 1.5; opacity: 0.5; fill: none; }
    .terminal-text { font-family: 'Fira Code', monospace; font-size: 11px; fill: #22d3ee; }
    .status-node { animation: pulse-node 2s infinite ease-in-out; }
  </style>

  <!-- Background Structure -->
  <rect width="100%" height="100%" fill="#03050a" rx="6" />
  
  <!-- Digital Grid Matrix -->
  <line x1="0" y1="40" x2="850" y2="40" class="grid" />
  <line x1="0" y1="80" x2="850" y2="80" class="grid" />
  <line x1="0" y1="120" x2="850" y2="120" class="grid" />
  <line x1="150" y1="0" x2="150" y2="160" class="grid" />
  <line x1="400" y1="0" x2="400" y2="160" class="grid" />
  <line x1="650" y1="0" x2="650" y2="160" class="grid" />

  <!-- Live Oscilloscope Channels (Continuous Loop Arrays) -->
  <g clip-path="url(#stream-clip)">
    <path class="sig-purple" d="M 0 80 Q 25 120, 50 80 T 100 80 T 150 80 T 200 80 T 250 80 T 300 80 T 350 80 T 400 80 T 450 80 T 500 80 T 550 80 T 600 80 T 650 80 T 700 80 T 750 80 T 800 80 T 850 80 T 900 80 T 950 80" />
    <path class="sig-cyan" d="M 0 80 Q 25 30, 50 80 T 100 80 T 150 80 T 200 80 T 250 80 T 300 80 T 350 80 T 400 80 T 450 80 T 500 80 T 550 80 T 600 80 T 650 80 T 700 80 T 750 80 T 800 80 T 850 80 T 900 80 T 950 80" />
  </g>

  <!-- Clipping mask window for seamless stream animation loop -->
  <clipPath id="stream-clip">
    <rect x="5" y="5" width="840" height="150" />
  </clipPath>

  <!-- High-Tech Interface Accents -->
  <rect x="5" y="5" width="840" height="150" class="frame-border" rx="4" />
  <path d="M 5 25 L 25 5 M 845 135 L 825 155 M 5 135 L 25 155 M 845 25 L 825 5" stroke="#00b4d8" stroke-width="1.5" />

  <!-- Diagnostics Telemetry Readouts -->
  <text x="20" y="25" class="terminal-text" font-weight="bold">[ SYS_MONITOR // CORE_ALIVE ]</text>
  <text x="20" y="145" class="terminal-text" fill="#9d4edd">CH1: 9.64 Gb/s</text>
  <text x="140" y="145" class="terminal-text" fill="#00b4d8">CH2: ASYNC_TUNNEL</text>
  
  <text x="690" y="25" class="terminal-text">SYS_LINK : ONLINE</text>
  <circle cx="815" cy="21" r="4" fill="#4ade80" class="status-node" />
</svg>
